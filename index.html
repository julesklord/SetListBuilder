<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FMG Setlist Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0908;--bg2:#111009;--surface:#161410;--surface2:#1e1b16;--surface3:#252118;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);--border3:rgba(255,255,255,0.18);
  --text:#f2ede4;--text2:#9e9889;--text3:#5c5850;
  --amber:#c8922e;--amber2:#e6ad55;--amber-bg:rgba(200,146,46,0.1);--amber-border:rgba(200,146,46,0.3);
  --blue:#3d7aad;--blue-bg:rgba(61,122,173,0.1);
  --coral:#a04838;--coral-bg:rgba(160,72,56,0.1);
  --purple:#6b5a9e;--purple-bg:rgba(107,90,158,0.1);
  --green:#3d7a52;--green-bg:rgba(61,122,82,0.1);
  --red:#a03030;--red-bg:rgba(160,48,48,0.1);
  --font-display:'Instrument Serif',serif;--font-body:'IBM Plex Sans',sans-serif;--font-mono:'IBM Plex Mono',monospace;
  --radius:4px;--radius-lg:8px;
}

html.light {
  --bg:#f5f4f1;--bg2:#ede9e3;--surface:#e8e4de;--surface2:#e0dbd4;--surface3:#d8d3cc;
  --border:rgba(0,0,0,0.06);--border2:rgba(0,0,0,0.12);--border3:rgba(0,0,0,0.18);
  --text:#2d2a27;--text2:#5d5955;--text3:#8a8480;
  --amber:#8b7355;--amber2:#9d8468;--amber-bg:rgba(139,115,85,0.08);--amber-border:rgba(139,115,85,0.22);
  --blue:#5a6d7f;--blue-bg:rgba(90,109,127,0.08);
  --coral:#7a5a52;--coral-bg:rgba(122,90,82,0.08);
  --purple:#6d6080;--purple-bg:rgba(109,96,128,0.08);
  --green:#5a7066;--green-bg:rgba(90,112,102,0.08);
  --red:#745a55;--red-bg:rgba(116,90,85,0.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.6;}
body{height:100vh;overflow:hidden;display:flex;flex-direction:column;}
button{cursor:pointer;font-family:var(--font-body);}
input,select,textarea{font-family:var(--font-body);}

/* LAYOUT — fixed viewport, no body scroll */
.topbar{background:var(--bg2);border-bottom:0.5px solid var(--border2);padding:0 1.5rem;display:flex;align-items:center;gap:1.5rem;height:52px;flex-shrink:0;}
.logo{font-family:var(--font-display);font-size:18px;color:var(--amber2);white-space:nowrap;}
.logo span{color:var(--text3);font-size:13px;font-family:var(--font-mono);margin-left:8px;}
.nav{display:flex;gap:2px;margin-left:auto;}
.nav-btn{font-family:var(--font-mono);font-size:11px;letter-spacing:0.06em;text-transform:uppercase;padding:5px 14px;border:0.5px solid transparent;background:transparent;color:var(--text3);border-radius:var(--radius);transition:all .15s;}
.nav-btn.active{color:var(--amber2);border-color:var(--amber-border);background:var(--amber-bg);}
.nav-btn:hover:not(.active){color:var(--text);background:var(--surface2);}
.theme-toggle{display:flex;gap:4px;margin-left:1.5rem;padding-left:1.5rem;border-left:0.5px solid var(--border2);}
.theme-btn{padding:4px 10px;border:0.5px solid var(--border2);background:transparent;color:var(--text3);border-radius:var(--radius);font-size:10px;font-family:var(--font-mono);letter-spacing:0.05em;text-transform:uppercase;transition:all .15s;cursor:pointer;}
.theme-btn:hover{border-color:var(--border3);color:var(--text);}
.theme-btn.active{border-color:var(--amber-border);background:var(--amber-bg);color:var(--amber2);}

/* content fills remaining height */
.content{display:grid;grid-template-columns:280px 1fr;flex:1;min-height:0;overflow:hidden;}

/* SIDEBAR */
.sidebar{background:var(--surface);border-right:0.5px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;}
.sidebar-section{padding:1rem;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.sidebar-label{font-family:var(--font-mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:.75rem;}
.instrument-row{display:flex;gap:6px;flex-wrap:wrap;}
.instr-chip{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;transition:all .15s;}
.instr-chip.active{border-color:var(--amber-border);background:var(--amber-bg);color:var(--amber2);}
.instr-chip.locked{border-color:var(--amber-border);background:var(--amber-bg);color:var(--amber2);opacity:.6;cursor:not-allowed;}
.instr-chip:hover:not(.locked):not(.active){border-color:var(--border3);color:var(--text);}
.instr-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
.sets-config{display:flex;gap:6px;}
.set-count-btn{flex:1;padding:6px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-family:var(--font-mono);font-size:11px;transition:all .15s;}
.set-count-btn.active{border-color:var(--amber-border);background:var(--amber-bg);color:var(--amber2);}
.set-count-btn:hover:not(.active){border-color:var(--border3);color:var(--text);}
.generate-btn{width:100%;padding:10px;background:var(--amber);color:var(--bg);border:none;border-radius:var(--radius);font-family:var(--font-mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;font-weight:500;transition:all .15s;margin-top:.5rem;}
.generate-btn:hover{background:var(--amber2);}
.generate-btn:active{transform:scale(.98);}
.saved-list{display:flex;flex-direction:column;gap:4px;}
.saved-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--radius);border:0.5px solid var(--border);background:var(--surface2);cursor:pointer;transition:all .15s;}
.saved-item:hover{border-color:var(--border2);background:var(--surface3);}
.saved-item.active-saved{border-color:var(--amber-border);background:var(--amber-bg);}
.saved-date{font-family:var(--font-mono);font-size:10px;color:var(--text3);}
.saved-name{font-size:12px;color:var(--text2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.saved-item.active-saved .saved-name{color:var(--amber2);}
.del-saved{background:transparent;border:none;color:var(--text3);font-size:14px;padding:0 2px;line-height:1;}
.del-saved:hover{color:var(--red);}
.empty-saved{font-size:12px;color:var(--text3);font-style:italic;padding:4px 0;}

/* MAIN — each view fills full height and scrolls internally */
.main{display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.view{display:none;flex-direction:column;height:100%;overflow:hidden;}
.view.active{display:flex;}

/* BUILDER */
.builder-header{padding:1.25rem 1.5rem .75rem;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0;}
.night-title-wrapper{display:flex;align-items:center;gap:8px;flex:1;min-width:160px;}
.night-title-input{font-family:var(--font-display);font-size:22px;background:transparent;border:none;color:var(--text);outline:none;flex:1;min-width:160px;padding:4px 8px;border-radius:var(--radius);transition:all .15s;}
.night-title-input:hover{background:var(--surface2);}
.night-title-input:focus{background:var(--surface);border:0.5px solid var(--amber-border);}
.night-title-input::placeholder{color:var(--text3);}
.header-actions{display:flex;gap:6px;margin-left:auto;}
.btn-sm{padding:5px 12px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-size:11px;font-family:var(--font-mono);letter-spacing:.05em;text-transform:uppercase;transition:all .15s;}
.btn-sm:hover{border-color:var(--border3);color:var(--text);background:var(--surface2);}
.btn-sm.accent{border-color:var(--amber-border);color:var(--amber);background:var(--amber-bg);}

/* THE KEY FIX: sets-area must have min-height:0 to actually scroll inside flex */
.sets-area{flex:1;min-height:0;padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:1.5rem;overflow-y:auto;}

.set-card{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-lg);overflow:hidden;flex-shrink:0;}
.set-card-header{padding:10px 14px;background:var(--surface2);display:flex;align-items:center;gap:10px;border-bottom:0.5px solid var(--border);}
.set-card-title{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--amber2);}
.set-card-meta{font-size:11px;color:var(--text3);font-family:var(--font-mono);}
.set-energy-bar{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.set-energy-fill{height:100%;border-radius:2px;background:var(--amber);transition:width .4s;}
.song-row{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:0.5px solid var(--border);transition:background .1s;cursor:grab;position:relative;}
.song-row:last-child{border-bottom:none;}
.song-row:hover{background:var(--surface2);}
.song-row.dragging{opacity:.4;}
.song-row.drag-over{background:var(--amber-bg);border-top:1px solid var(--amber-border);}
.drag-handle{color:var(--text3);font-size:12px;cursor:grab;user-select:none;padding:0 2px;}
.song-num{font-family:var(--font-mono);font-size:10px;color:var(--text3);width:18px;text-align:right;flex-shrink:0;}
.song-info{flex:1;min-width:0;}
.song-title{font-weight:500;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.song-artist{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.song-key{font-family:var(--font-mono);font-size:11px;color:var(--amber);width:32px;flex-shrink:0;}
.song-bpm{font-family:var(--font-mono);font-size:11px;color:var(--text3);width:36px;flex-shrink:0;}
.song-badge{font-size:10px;padding:1px 6px;border-radius:3px;flex-shrink:0;}
.badge-Blues{background:var(--blue-bg);color:var(--blue);}
.badge-RnB{background:var(--purple-bg);color:var(--purple);}
.badge-Ballad{background:var(--coral-bg);color:var(--coral);}
.energy-mini{display:flex;gap:2px;align-items:center;flex-shrink:0;}
.edot{width:5px;height:5px;border-radius:50%;background:var(--border2);}
.edot.on{background:var(--blue);}
.edot.hi{background:#185FA5;}
.song-remove{background:transparent;border:none;color:var(--text3);font-size:14px;padding:0 3px;line-height:1;opacity:0;transition:opacity .15s;}
.song-row:hover .song-remove{opacity:1;}
.song-remove:hover{color:var(--red);}
.add-song-row{padding:8px 14px;display:flex;align-items:center;gap:8px;}
.add-song-select{flex:1;background:var(--surface2);border:0.5px solid var(--border2);color:var(--text2);padding:5px 8px;border-radius:var(--radius);font-size:12px;outline:none;}
.add-song-select:focus{border-color:var(--amber-border);}
.add-btn{padding:5px 12px;background:transparent;border:0.5px solid var(--border2);color:var(--text2);border-radius:var(--radius);font-size:11px;font-family:var(--font-mono);transition:all .15s;}
.add-btn:hover{border-color:var(--amber-border);color:var(--amber);background:var(--amber-bg);}

/* POOL */
.pool-header{padding:1.25rem 1.5rem .75rem;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0;}
.pool-title{font-family:var(--font-display);font-size:22px;color:var(--text);}
.pool-search{flex:1;min-width:160px;background:var(--surface2);border:0.5px solid var(--border2);color:var(--text);padding:6px 10px;border-radius:var(--radius);font-size:12px;outline:none;}
.pool-search:focus{border-color:var(--amber-border);}
.pool-search::placeholder{color:var(--text3);}
.pool-filters{display:flex;gap:5px;}
.pool-filter-btn{font-size:11px;padding:4px 10px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-family:var(--font-mono);transition:all .15s;}
.pool-filter-btn.active{border-color:var(--amber-border);background:var(--amber-bg);color:var(--amber2);}
.pool-filter-btn:hover:not(.active){border-color:var(--border3);color:var(--text);}
.add-new-song-btn{margin:.75rem 1.5rem;padding:9px 16px;background:transparent;border:0.5px dashed var(--border2);color:var(--text2);border-radius:var(--radius);font-size:12px;font-family:var(--font-mono);transition:all .15s;text-align:left;flex-shrink:0;}
.add-new-song-btn:hover{border-color:var(--amber-border);color:var(--amber);background:var(--amber-bg);}
/* pool table wrapper scrolls independently */
.pool-table-wrap{flex:1;min-height:0;overflow-y:auto;padding:0 1.5rem 1.5rem;}
.pool-table{width:100%;border-collapse:collapse;margin-top:.5rem;}
.pool-table thead th{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);text-align:left;padding:6px 8px;border-bottom:0.5px solid var(--border2);font-weight:400;}
.pool-table tbody tr{border-bottom:0.5px solid var(--border);transition:background .1s;}
.pool-table tbody tr:hover{background:var(--surface2);}
.pool-table td{padding:9px 8px;}
.pool-table td.pt{font-weight:500;font-size:13px;}
.pool-table td.pa{color:var(--text2);font-size:12px;}
.pool-table td.pk{font-family:var(--font-mono);font-size:12px;color:var(--amber);}
.pool-table td.pb{font-family:var(--font-mono);font-size:12px;color:var(--text3);}
.pool-table td.pp{font-family:var(--font-mono);font-size:11px;color:var(--text3);}
.pool-instr{display:flex;gap:4px;}
.instr-dot-sm{width:14px;height:14px;border-radius:2px;font-size:8px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:500;}
.id-g{background:var(--amber-bg);color:var(--amber);}
.id-p{background:var(--blue-bg);color:var(--blue);}
.id-v{background:var(--green-bg);color:var(--green);}
.edit-song-btn{background:transparent;border:0.5px solid var(--border);color:var(--text3);padding:3px 8px;border-radius:var(--radius);font-size:10px;font-family:var(--font-mono);transition:all .15s;}
.edit-song-btn:hover{border-color:var(--border2);color:var(--text);}
.del-song-btn{background:transparent;border:0.5px solid var(--border);color:var(--text3);padding:3px 8px;border-radius:var(--radius);font-size:10px;font-family:var(--font-mono);transition:all .15s;margin-left:4px;}
.del-song-btn:hover{border-color:rgba(160,48,48,.4);color:var(--red);background:var(--red-bg);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:0.5px solid var(--border3);border-radius:var(--radius-lg);padding:1.5rem;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;}
.modal-title{font-family:var(--font-display);font-size:20px;margin-bottom:1.25rem;color:var(--text);}
.form-row{margin-bottom:1rem;}
.form-label{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:5px;}
.form-input{width:100%;background:var(--surface2);border:0.5px solid var(--border2);color:var(--text);padding:7px 10px;border-radius:var(--radius);font-size:13px;outline:none;transition:border-color .15s;}
.form-input:focus{border-color:var(--amber-border);}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:1rem;}
.instr-toggle{display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;transition:all .15s;}
.instr-toggle.on{border-color:var(--amber-border);background:var(--amber-bg);color:var(--amber2);}
.instr-toggle:hover:not(.on){border-color:var(--border3);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;}
.btn-cancel{padding:7px 16px;background:transparent;border:0.5px solid var(--border2);color:var(--text2);border-radius:var(--radius);font-size:12px;font-family:var(--font-mono);transition:all .15s;}
.btn-cancel:hover{border-color:var(--border3);color:var(--text);}
.btn-save{padding:7px 16px;background:var(--amber);border:none;color:var(--bg);border-radius:var(--radius);font-size:12px;font-family:var(--font-mono);font-weight:500;transition:all .15s;}
.btn-save:hover{background:var(--amber2);}

/* EXPORT */
.export-area{flex:1;min-height:0;padding:1.5rem;overflow-y:auto;}
.export-title{font-family:var(--font-display);font-size:22px;margin-bottom:1.5rem;}
.export-preview{background:var(--surface);border:0.5px solid var(--border2);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1rem;}
.export-night-title{font-family:var(--font-display);font-size:28px;color:var(--amber2);margin-bottom:4px;}
.export-meta{font-family:var(--font-mono);font-size:11px;color:var(--text3);margin-bottom:1.5rem;}
.export-set{margin-bottom:1.5rem;}
.export-set-title{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--amber);margin-bottom:.5rem;padding-bottom:5px;border-bottom:0.5px solid var(--border2);}
.export-song-row{display:flex;gap:12px;padding:5px 0;border-bottom:0.5px solid var(--border);font-size:12px;}
.export-song-row:last-child{border-bottom:none;}
.en{color:var(--text3);font-family:var(--font-mono);width:16px;flex-shrink:0;}
.et{flex:1;font-weight:500;}
.ea{color:var(--text2);}
.ek{font-family:var(--font-mono);color:var(--amber);}
.eb{font-family:var(--font-mono);color:var(--text3);}
.export-btn{display:block;width:100%;padding:10px;background:var(--surface2);border:0.5px solid var(--border2);color:var(--text2);border-radius:var(--radius);font-family:var(--font-mono);font-size:12px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;transition:all .15s;text-align:center;}
.export-btn:hover{border-color:var(--amber-border);color:var(--amber);background:var(--amber-bg);}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--surface3);border:0.5px solid var(--border2);color:var(--text2);padding:9px 16px;border-radius:var(--radius);font-size:12px;font-family:var(--font-mono);z-index:300;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">Fearlessly Media Group <span>// setlist builder</span></div>
  <div class="nav">
    <button class="nav-btn active" onclick="switchView('builder')">Builder</button>
    <button class="nav-btn" onclick="switchView('pool')">Pool</button>
    <button class="nav-btn" onclick="switchView('export')">Export</button>
  </div>
  <div class="theme-toggle">
    <button class="theme-btn active" id="theme-dark-btn" onclick="setTheme('dark')">🌙 Oscuro</button>
    <button class="theme-btn" id="theme-light-btn" onclick="setTheme('light')">☀️ Claro</button>
  </div>
</div>
<div class="content">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Instrumentos esta noche</div>
      <div class="instrument-row">
        <div class="instr-chip locked"><div class="instr-dot"></div>Guitarra</div>
        <button class="instr-chip" id="chip-piano" onclick="toggleInstr('piano')"><div class="instr-dot"></div>Piano</button>
        <button class="instr-chip" id="chip-viento" onclick="toggleInstr('viento')"><div class="instr-dot"></div>Vientos</button>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Sets</div>
      <div class="sets-config">
        <button class="set-count-btn" onclick="setNumSets(2)">2</button>
        <button class="set-count-btn active" onclick="setNumSets(3)">3</button>
        <button class="set-count-btn" onclick="setNumSets(4)">4</button>
      </div>
      <div style="margin-top:8px;">
        <div class="sidebar-label">Duración por set</div>
        <select class="add-song-select" id="set-duration" style="width:100%;">
          <option value="40">~40 min</option>
          <option value="45" selected>~45 min</option>
          <option value="55">~55 min</option>
          <option value="60">~60 min</option>
        </select>
      </div>
      <button class="generate-btn" onclick="generateSetlist()">Generar Setlist</button>
    </div>
    <div class="sidebar-section" style="flex:1;overflow-y:auto;">
      <div class="sidebar-label">Noches guardadas</div>
      <div class="saved-list" id="saved-list"></div>
    </div>
  </div>

  <div class="main">
    <!-- BUILDER -->
    <div class="view active" id="view-builder">

function generateSetlist() {
  const dur = parseInt(document.getElementById('set-duration').value);
  const songsPerSet = Math.round(dur / 4.5);

  let eligible = pool.filter(s=>s.instr.some(i=>activeInstrs.includes(i)));
  if(eligible.length < songsPerSet * numSets) eligible = [...pool];

  const shuffle = a=>[...a].sort(()=>Math.random()-.5);
  const low = shuffle(eligible.filter(s=>s.energy<=2));
  const mid = shuffle(eligible.filter(s=>s.energy===3));
  const high = shuffle(eligible.filter(s=>s.energy>=4));

  const usedIds = new Set();
  function pick(arr, n) {
    const out=[];
    for(const s of arr){if(out.length>=n)break;if(!usedIds.has(s.id)){out.push(s);usedIds.add(s.id);}}
    return out;
  }
  // fallback pool for when buckets run dry
  const allShuffled = shuffle(eligible);
  function pickFallback(n) {
    const out=[];
    for(const s of allShuffled){if(out.length>=n)break;if(!usedIds.has(s.id)){out.push(s);usedIds.add(s.id);}}
    return out;
  }

  currentSets = [];
  for(let i=0;i<numSets;i++){
    const isLast = i===numSets-1;
    const lowN = isLast ? Math.floor(songsPerSet*.2) : Math.floor(songsPerSet*.35);
    const highN = isLast ? Math.floor(songsPerSet*.4) : Math.floor(songsPerSet*.25);
    const midN = songsPerSet - lowN - highN;

    let setLow = pick(low, lowN);
    let setMid = pick(mid, midN);
    let setHigh = pick(high, highN);

    // FIX: fill gaps with fallback so every set reaches songsPerSet
    let arranged = [...setLow, ...setMid, ...setHigh];
    if(arranged.length < songsPerSet) {
      const extras = pickFallback(songsPerSet - arranged.length);
      arranged = [...arranged, ...extras];
    }

    arranged = avoidConsecutiveKey(arranged);
    currentSets.push(arranged);
  }

  renderSets();
  toast('Setlist generado — ' + currentSets.reduce((a,s)=>a+s.length,0) + ' canciones');
}

function avoidConsecutiveKey(arr) {
  const r=[...arr];
  for(let i=1;i<r.length;i++){
    if(r[i].key===r[i-1].key&&i+1<r.length){const t=r[i];r[i]=r[i+1];r[i+1]=t;}
  }
  return r;
}

function renderSets() {
  const area = document.getElementById('sets-area');
  area.innerHTML='';
  currentSets.forEach((songs,si)=>{
    const avgE = songs.length ? songs.reduce((a,s)=>a+s.energy,0)/songs.length : 0;
    const ePct = Math.round((avgE/5)*100);
    const totalMin = Math.round(songs.reduce((a,s)=>a+(s.bpm>90?3.5:s.bpm>70?4.5:5.5),0));
    const card = document.createElement('div');
    card.className='set-card';
    card.innerHTML=`
      <div class="set-card-header">
        <span class="set-card-title">Set ${si+1}</span>
        <span class="set-card-meta">${songs.length} canciones · ~${totalMin} min</span>
        <div class="set-energy-bar"><div class="set-energy-fill" style="width:${ePct}%"></div></div>
      </div>
      <div id="set-songs-${si}">${songs.map((s,i)=>songRowHTML(s,i,si)).join('')}</div>
      <div class="add-song-row">
        <select class="add-song-select" id="add-sel-${si}">
          <option value="">+ Agregar canción…</option>
          ${pool.map(s=>`<option value="${s.id}">${s.title} — ${s.artist}</option>`).join('')}

        <button class="add-btn" onclick="addSongToSet(${si})">Add</button>
      </div>`;
    area.appendChild(card);
  });

}

function songRowHTML(s,i,si){
  return `<div class="song-row" draggable="true" data-id="${s.id}" data-si="${si}" data-i="${i}">
    <span class="drag-handle">⠿</span>
    <span class="song-num">${i+1}</span>
    <div class="song-info"><div class="song-title">${s.title}</div><div class="song-artist">${s.artist}</div></div>
    <span class="song-key">${s.key}</span>
    <span class="song-bpm">${s.bpm}</span>
    <span class="song-badge badge-${s.genre==='R&B'?'RnB':s.genre}">${s.genre}</span>
    <div class="energy-mini">${Array.from({length:5},(_,j)=>`<div class="edot${j<s.energy?' on':''}${j<s.energy&&s.energy>=4?' hi':''}"></div>`).join('')}</div>
    <button class="song-remove" onclick="removeSongFromSet(${si},${s.id})" title="Quitar">×</button>
  </div>`;
}

function attachDragHandlers(){
  document.querySelectorAll('.song-row').forEach(row=>{
    row.addEventListener('dragstart',e=>{dragSrc=row;row.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    row.addEventListener('dragend',()=>{row.classList.remove('dragging');document.querySelectorAll('.song-row').forEach(r=>r.classList.remove('drag-over'));});
    row.addEventListener('dragover',e=>{e.preventDefault();if(row!==dragSrc)row.classList.add('drag-over');});
    row.addEventListener('dragleave',()=>row.classList.remove('drag-over'));
    row.addEventListener('drop',e=>{
      e.preventDefault();row.classList.remove('drag-over');
      if(!dragSrc||dragSrc===row)return;
      const srcSi=parseInt(dragSrc.dataset.si),srcId=parseInt(dragSrc.dataset.id);
      const dstSi=parseInt(row.dataset.si),dstId=parseInt(row.dataset.id);
      if(srcSi!==dstSi)return;
      const set=currentSets[srcSi];
      const si=set.findIndex(s=>s.id===srcId),di=set.findIndex(s=>s.id===dstId);
      const[moved]=set.splice(si,1);set.splice(di,0,moved);
      renderSets();
    });
  });
}

function removeSongFromSet(si,id){currentSets[si]=currentSets[si].filter(s=>s.id!==id);renderSets();}

function addSongToSet(si){

  if(song){currentSets[si].push(song);renderSets();}

function openEditModal(id){
  editingId=id;
  const s=pool.find(x=>x.id===id);
  document.getElementById('modal-title').textContent='Editar canción';
  document.getElementById('m-title').value=s.title;
  document.getElementById('m-artist').value=s.artist;
  document.getElementById('m-genre').value=s.genre;
  document.getElementById('m-key').value=s.key;
  document.getElementById('m-bpm').value=s.bpm;
  document.getElementById('m-prog').value=s.prog;
  document.getElementById('m-energy').value=s.energy;
  ['g','p','v'].forEach(i=>document.getElementById('mt-'+i).classList.toggle('on',s.instr.includes(i)));
  document.getElementById('song-modal').classList.add('open');
}

function closeModal(){document.getElementById('song-modal').classList.remove('open');}
function toggleModalInstr(i){if(i==='g')return;document.getElementById('mt-'+i).classList.toggle('on');}

function saveSong(){
  const title=document.getElementById('m-title').value.trim();
  const artist=document.getElementById('m-artist').value.trim();
  if(!title||!artist){toast('Título y artista requeridos');return;}
  const instr=['g','p','v'].filter(i=>document.getElementById('mt-'+i).classList.contains('on'));
  const song={
    id:editingId||nextId++,title,artist,
    genre:document.getElementById('m-genre').value,
    key:document.getElementById('m-key').value.trim()||'C',
    bpm:parseInt(document.getElementById('m-bpm').value)||72,
    prog:document.getElementById('m-prog').value.trim()||'I–IV–V',
    energy:Math.min(5,Math.max(1,parseInt(document.getElementById('m-energy').value)||3)),
    instr
  };
  if(editingId){pool[pool.findIndex(s=>s.id===editingId)]=song;}
  else{pool.push(song);}
  save();closeModal();renderPool();
  toast(editingId?'Canción actualizada':'Canción agregada');
}

function renderExport(){
  const title=document.getElementById('night-title').value||'Setlist';
  const date=new Date().toLocaleDateString('es-MX',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const instrNames=activeInstrs.map(i=>({g:'Guitarra',p:'Piano',v:'Vientos'}[i])).join(', ');
  let html=`<div class="export-night-title">${title}</div><div class="export-meta">${date} &nbsp;·&nbsp; ${instrNames} &nbsp;·&nbsp; ${numSets} sets</div>`;
  currentSets.forEach((songs,si)=>{
    const totalMin=Math.round(songs.reduce((a,s)=>a+(s.bpm>90?3.5:s.bpm>70?4.5:5.5),0));
    html+=`<div class="export-set"><div class="export-set-title">Set ${si+1} — ${songs.length} canciones · ~${totalMin} min</div>
      ${songs.map((s,i)=>`<div class="export-song-row"><span class="en">${i+1}</span><span class="et">${s.title}</span><span class="ea">${s.artist}</span><span class="ek">${s.key}</span><span class="eb">${s.bpm}</span></div>`).join('')}
    </div>`;
  });
  document.getElementById('export-preview').innerHTML=html;
}

function exportHTML(){
  const title=document.getElementById('night-title').value||'Setlist';
  const date=new Date().toLocaleDateString('es-MX',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  let c=`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>${title}</title>
  <style>body{font-family:monospace;background:#0a0908;color:#f2ede4;padding:2rem;max-width:700px;margin:0 auto;}
  h1{color:#e6ad55;font-size:2rem;margin-bottom:4px;}.meta{color:#5c5850;font-size:12px;margin-bottom:2rem;}
  .st{color:#c8922e;font-size:11px;letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid #222;padding-bottom:4px;margin:1.5rem 0 .5rem;}
  .r{display:flex;gap:12px;padding:5px 0;border-bottom:1px solid #1a1a1a;font-size:13px;}
  .n{color:#5c5850;width:20px;}.t{flex:1;font-weight:bold;}.a{color:#9e9889;}.k{color:#c8922e;}</style>
  </head><body><h1>${title}</h1><div class="meta">${date} · ${numSets} sets</div>`;
  currentSets.forEach((songs,si)=>{
    const totalMin=Math.round(songs.reduce((a,s)=>a+(s.bpm>90?3.5:s.bpm>70?4.5:5.5),0));
    c+=`<div class="st">Set ${si+1} — ${songs.length} canciones · ~${totalMin} min</div>`;
    songs.forEach((s,i)=>{c+=`<div class="r"><span class="n">${i+1}</span><span class="t">${s.title}</span><span class="a">${s.artist}</span><span class="k">${s.key}</span><span class="k" style="color:#5c5850">${s.bpm}</span></div>`;});
  });
  c+=`</body></html>`;
  const a=document.createElement('a');
  a.href='data:text/html;charset=utf-8,'+encodeURIComponent(c);
  a.download=title.replace(/\s+/g,'-').toLowerCase()+'.html';
  a.click();toast('HTML descargado');
}

function exportText(){
  const title=document.getElementById('night-title').value||'Setlist';
  let t=title.toUpperCase()+'\n'+'='.repeat(title.length)+'\n\n';
  currentSets.forEach((songs,si)=>{
    t+=`SET ${si+1}\n${'-'.repeat(20)}\n`;
    songs.forEach((s,i)=>{t+=`${i+1}. ${s.title} — ${s.artist} (${s.key}, ${s.bpm} BPM)\n`;});
    t+='\n';
  });
  navigator.clipboard.writeText(t).then(()=>toast('Copiado al clipboard'));
}
